<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Notebook Animation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #F5F3F0;
      font-family: Georgia, 'Times New Roman', serif;
      -webkit-font-smoothing: antialiased;
    }

    #scene {
      width: 100%; height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Warm light overlay */
    #warm-light {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      background: radial-gradient(ellipse at 25% 15%, rgba(255,240,200,0.12) 0%, transparent 55%);
      pointer-events: none; z-index: 0;
    }

    /* Floating page */
    #page {
      width: 52vmin;
      max-width: 240px;
      height: 74vmin;
      max-height: 340px;
      position: relative;
      z-index: 2;
      background: linear-gradient(160deg, #FDFBF7 0%, #F8F5EF 100%);
      box-shadow: 0 4px 20px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.05);
      opacity: 0;
      transform: scale(0.94);
      animation: fadeIn 0.8s ease-out forwards, hover 3.5s ease-in-out 0.8s infinite;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes hover {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-4px) scale(1.004); }
    }

    /* Ruled lines */
    #ruled {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      background:
        repeating-linear-gradient(to bottom,
          transparent, transparent 19px,
          rgba(140,160,190,0.12) 19px, rgba(140,160,190,0.12) 20px
        );
      background-position: 0 16px;
    }
    #ruled::before {
      content: '';
      position: absolute;
      left: 12%; top: 0; bottom: 0;
      width: 1px;
      background: rgba(200,120,120,0.1);
    }

    /* Ribbon */
    #ribbon {
      position: absolute;
      top: -2px; left: 18%;
      width: 6px; height: 55%;
      background: linear-gradient(180deg, #3D8B8F 0%, #2D7B7F 100%);
      z-index: 10;
      clip-path: polygon(0 0, 100% 0, 100% 90%, 50% 82%, 0 90%);
      opacity: 0;
      animation: fadeIn 0.8s ease-out 0.4s forwards;
    }

    /* Quote content */
    #quote-content {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 18% 10%;
      z-index: 5;
    }

    #quote-mark {
      font-size: 40px; line-height: 1;
      color: rgba(58,53,48,0.18);
      margin-bottom: 4px;
      opacity: 0;
      animation: fadeIn 0.6s ease-out 1.0s forwards;
    }

    #quote-text {
      font-style: italic;
      font-size: 13px; line-height: 1.8;
      color: #3A3530;
      text-align: center;
      letter-spacing: 0.02em;
      min-height: 48px;
    }

    #cursor {
      display: inline-block;
      width: 1.5px; height: 15px;
      background: #3A3530;
      vertical-align: middle;
      margin-left: 1px;
      animation: blink 0.8s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    #quote-author {
      margin-top: 12px;
      font-size: 10px;
      color: rgba(58,53,48,0.45);
      letter-spacing: 0.06em;
      opacity: 0;
      transition: opacity 0.8s ease;
    }
    #quote-author.visible { opacity: 1; }

    #quote-line {
      width: 36px; height: 1px;
      background: rgba(58,53,48,0.12);
      margin-top: 14px;
      opacity: 0;
      transition: opacity 0.8s ease;
    }
    #quote-line.visible { opacity: 1; }

    /* Dust particles */
    .particle {
      position: absolute;
      background: rgba(200,180,150,0.3);
      border-radius: 50%;
      pointer-events: none;
      z-index: 1;
      animation: dust linear infinite;
    }
    @keyframes dust {
      0%   { transform: translateY(0) translateX(0); opacity: 0; }
      10%  { opacity: 0.4; }
      90%  { opacity: 0.15; }
      100% { transform: translateY(-70vh) translateX(25px); opacity: 0; }
    }
  </style>
</head>
<body>
  <div id="scene">
    <div id="warm-light"></div>

    <div id="page">
      <div id="ruled"></div>
      <div id="ribbon"></div>
      <div id="quote-content">
        <div id="quote-mark">&ldquo;</div>
        <div id="quote-text"><span id="typed"></span><span id="cursor"></span></div>
        <div id="quote-author">&mdash; Abraham Lincoln</div>
        <div id="quote-line"></div>
      </div>
    </div>
  </div>

  <script>
    // Dust particles
    var scene = document.getElementById('scene');
    for (var i = 0; i < 8; i++) {
      var dot = document.createElement('div');
      dot.className = 'particle';
      dot.style.left = (Math.random() * 100) + '%';
      dot.style.top = (50 + Math.random() * 50) + '%';
      dot.style.animationDuration = (12 + Math.random() * 14) + 's';
      dot.style.animationDelay = (Math.random() * 8) + 's';
      var sz = 2 + Math.random() * 2;
      dot.style.width = sz + 'px';
      dot.style.height = sz + 'px';
      scene.appendChild(dot);
    }

    // Typewriter
    var text = 'The best way to predict\nyour future is to create it.';
    var typed = document.getElementById('typed');
    var cursor = document.getElementById('cursor');
    var author = document.getElementById('quote-author');
    var line = document.getElementById('quote-line');
    var charIndex = 0;
    var signaled = false;

    function typeNext() {
      if (charIndex < text.length) {
        var ch = text[charIndex];
        if (ch === '\n') {
          typed.innerHTML += '<br>';
        } else {
          typed.appendChild(document.createTextNode(ch));
        }
        charIndex++;
        setTimeout(typeNext, 50);
      } else {
        // Done typing — show author, hide cursor
        cursor.style.display = 'none';
        author.classList.add('visible');
        setTimeout(function() {
          line.classList.add('visible');
        }, 400);
      }
    }

    // Start typewriter after page fades in (1.2s delay)
    setTimeout(typeNext, 1200);

    // Signal Android at 5.5s
    setTimeout(function() {
      if (!signaled) {
        signaled = true;
        try {
          if (typeof Android !== 'undefined' && Android.onAnimationComplete) {
            Android.onAnimationComplete();
          }
        } catch(e) {}
        try {
          window.dispatchEvent(new CustomEvent('notebookAnimationComplete'));
        } catch(e) {}
      }
    }, 5500);
  </script>
</body>
</html>
